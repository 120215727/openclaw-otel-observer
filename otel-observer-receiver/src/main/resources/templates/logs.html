<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Logs - Otel Observer</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script th:src="@{/js/common.js}"></script>
    <th:block th:replace="~{fragments/banner :: banner-styles}"></th:block>
</head>
<body>
    <div id="app" class="container">
        <th:block th:replace="~{fragments/banner :: banner('logs', null)}"></th:block>

        <!-- Filters -->
        <div class="filters-bar">
            <div class="filter-group">
                <label class="filter-label">搜索</label>
                <input type="text" class="filter-input" v-model="filters.search" @keyup.enter="loadData" placeholder="搜索消息...">
            </div>
            <div class="filter-group">
                <label class="filter-label">Level</label>
                <select class="filter-select" v-model="filters.logLevel" @change="loadData">
                    <option value="">全部</option>
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO">INFO</option>
                    <option value="WARN">WARN</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Service</label>
                <input type="text" class="filter-input" v-model="filters.serviceName" @keyup.enter="loadData" placeholder="Service 名称...">
            </div>
            <button class="btn btn-primary" @click="loadData" :disabled="loading">搜索</button>
            <button class="btn btn-secondary" @click="resetFilters">重置</button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">总 Logs: <strong>{{ formatNumber(total) }}</strong></div>
            <div class="stat-item">当前页: <strong>{{ currentPage + 1 }}</strong> / <strong>{{ totalPages }}</strong></div>
        </div>

        <!-- Logs Table -->
        <div class="card">
            <div v-if="loading" class="loading">
                <div class="spinner"></div>
            </div>
            <div v-else class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Service</th>
                            <th>Level</th>
                            <th>Message</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-if="logs.length === 0">
                            <td colspan="4" class="empty">暂无 Log 数据</td>
                        </tr>
                        <tr v-for="log in logs" :key="log.id">
                            <td><span class="badge badge-trace">{{ log.serviceName || '-' }}</span></td>
                            <td>
                                <span :class="['badge', getLogBadgeClass(log.logLevel)]">
                                    {{ log.logLevel || '-' }}
                                </span>
                            </td>
                            <td style="max-width: 600px;">{{ truncate(log.message, 150) }}</td>
                            <td>{{ formatDateTime(log.timestamp || log.createdAt) }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination" v-if="totalPages > 1">
                <button :disabled="currentPage === 0" @click="goToPage(currentPage - 1)">← 上一页</button>
                <template v-for="p in visiblePages" :key="p">
                    <span v-if="p === '...'" class="page-ellipsis">...</span>
                    <span v-else :class="['page-num', { active: p === currentPage }]" @click="goToPage(p)">
                        {{ p + 1 }}
                    </span>
                </template>
                <button :disabled="currentPage >= totalPages - 1" @click="goToPage(currentPage + 1)">下一页 →</button>
            </div>
        </div>

        <button class="refresh-btn" @click="loadData" :disabled="loading" title="刷新数据">
            {{ loading ? '⟳' : '🔄' }}
        </button>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const logs = ref([]);
                const total = ref(0);
                const currentPage = ref(0);
                const totalPages = ref(1);
                const loading = ref(false);
                const pageSize = 20;

                const filters = ref({
                    search: '',
                    logLevel: '',
                    serviceName: ''
                });

                const visiblePages = computed(() => {
                    const pages = [];
                    const total = totalPages.value;
                    const current = currentPage.value;

                    if (total <= 7) {
                        for (let i = 0; i < total; i++) pages.push(i);
                    } else {
                        if (current <= 3) {
                            for (let i = 0; i < 5; i++) pages.push(i);
                            pages.push('...');
                            pages.push(total - 1);
                        } else if (current >= total - 4) {
                            pages.push(0);
                            pages.push('...');
                            for (let i = total - 5; i < total; i++) pages.push(i);
                        } else {
                            pages.push(0);
                            pages.push('...');
                            for (let i = current - 1; i <= current + 1; i++) pages.push(i);
                            pages.push('...');
                            pages.push(total - 1);
                        }
                    }
                    return pages;
                });

                const formatNumber = (num) => {
                    if (num == null) return '0';
                    return num.toLocaleString('zh-CN');
                };

                const formatDateTime = (date) => {
                    if (!date) return '-';
                    return Format.date(date);
                };

                const truncate = (str, maxLen) => {
                    if (!str) return '-';
                    return str.length > maxLen ? str.substring(0, maxLen) + '...' : str;
                };

                const getLogBadgeClass = (level) => {
                    if (!level) return 'badge-log';
                    const l = level.toUpperCase();
                    if (l === 'ERROR') return 'badge-log-error';
                    if (l === 'WARN' || l === 'WARNING') return 'badge-log-warn';
                    if (l === 'INFO') return 'badge-log-info';
                    if (l === 'DEBUG') return 'badge-log-debug';
                    return 'badge-log';
                };

                const loadData = async () => {
                    loading.value = true;
                    try {
                        const params = {
                            page: currentPage.value,
                            size: pageSize,
                            ...(filters.value.search && { search: filters.value.search }),
                            ...(filters.value.logLevel && { logLevel: filters.value.logLevel }),
                            ...(filters.value.serviceName && { serviceName: filters.value.serviceName })
                        };
                        const data = await Api.get('/api/logs', params);
                        logs.value = data.items || [];
                        total.value = data.total || 0;
                        totalPages.value = data.totalPages || 1;
                    } catch (error) {
                        console.error('Failed to load logs:', error);
                    } finally {
                        loading.value = false;
                    }
                };

                const goToPage = (page) => {
                    if (page >= 0 && page < totalPages.value) {
                        currentPage.value = page;
                        loadData();
                    }
                };

                const resetFilters = () => {
                    filters.value = { search: '', logLevel: '', serviceName: '' };
                    currentPage.value = 0;
                    loadData();
                };

                onMounted(() => {
                    loadData();
                });

                return {
                    logs,
                    total,
                    currentPage,
                    totalPages,
                    loading,
                    filters,
                    visiblePages,
                    formatNumber,
                    formatDateTime,
                    truncate,
                    getLogBadgeClass,
                    loadData,
                    goToPage,
                    resetFilters
                };
            }
        }).mount('#app');
    </script>

    <style>
        .page-num {
            padding: 8px 16px;
            border: 1px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .page-num:hover:not(.active) {
            background: #667eea;
            color: white;
        }
        .page-num.active {
            background: #667eea;
            color: white;
            cursor: default;
        }
        .page-ellipsis {
            padding: 8px 8px;
            color: #999;
        }
    </style>
</body>
</html>
